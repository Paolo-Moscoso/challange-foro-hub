# Use an in-memory database for tests (no external MySQL required)
spring.datasource.url=jdbc:h2:mem:foro_hub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Avoid Hibernate trying to determine a Dialect from a non-existent JDBC connection.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
